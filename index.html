<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operativo - Control en Vivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Vista de pedidos en vivo</h1>
    </header>

    <div class="tablero">
        <div class="columna preparacion">
            <div class="columna-titulo">
                En Preparación <span id="cant-preparacion" class="contador">0</span>
            </div>
            <div class="lista-pedidos" id="col-preparacion"></div>
        </div>

        <div class="columna revisar">
            <div class="columna-titulo">
                Pedidos para revisar <span id="cant-revisar" class="contador">0</span>
            </div>
            <div class="lista-pedidos" id="col-revisar"></div>
        </div>

        <div class="columna listo">
            <div class="columna-titulo">
                Para Facturar <span id="cant-listo" class="contador">0</span>
            </div>
            <div class="lista-pedidos" id="col-listo"></div>
        </div>

        <div class="columna despachado">
            <div class="columna-titulo">
                Para Despachar <span id="cant-despachado" class="contador">0</span>
            </div>
            <div class="lista-pedidos" id="col-despachado"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
